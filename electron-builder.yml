appId: com.flo.notepadbyflo
productName: Notepad by Flo
directories:
  output: dist
files:
  - dist-main/**/*
  - dist/renderer/**/*
  - package.json
  - notepad.png
mac:
  target: dmg
  identity: null
  icon: notepad.png
  category: public.app-category.productivity
win:
  target: nsis
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
